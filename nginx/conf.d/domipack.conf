# ============================================================
# Domipack — vhost nginx PRODUCTION
# ============================================================
# HTTPS actif (Let's Encrypt) + Umami désactivé (crash récurrent).
# Ce fichier est la source de vérité — git pull ne l'écrase plus.
# ============================================================

# ────────────────── HTTP (redirect vers HTTPS) ──────────────────
server {
    listen 80;
    server_name domipackung.de www.domipackung.de;

    # Challenge Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Tout le reste → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ────────────────── HTTPS ──────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name domipackung.de www.domipackung.de;

    ssl_certificate     /etc/letsencrypt/live/domipackung.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/domipackung.de/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 10M;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache des assets statiques Next.js
    location /_next/static/ {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Umami — désactivé (crash récurrent, nécessite sa propre DB)
    # location /analytics/ {
    #     proxy_pass http://umami:3001/;
    # }
}
