# ============================================================
# Domipack — vhost nginx
# ============================================================
# Au premier déploiement : uniquement HTTP (port 80) pour permettre
# à certbot de générer le certificat Let's Encrypt.
#
# APRÈS le premier certbot, décommenter le bloc HTTPS (ligne 60+)
# et relancer: docker compose -f docker-compose.prod.yml restart nginx
# ============================================================

# ────────────────── HTTP (port 80) ──────────────────
server {
    listen 80;
    server_name _;

    # Challenge Let's Encrypt (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy Umami analytics (self-hosted, privacy-first)
    location /analytics/ {
        proxy_pass http://umami:3001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy vers l'app Next.js
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache des assets statiques Next.js
    location /_next/static/ {
        proxy_pass http://app:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

